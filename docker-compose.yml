services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financas}
      POSTGRES_USER: ${POSTGRES_USER:-financas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financas} -d ${POSTGRES_DB:-financas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-financas}:${POSTGRES_PASSWORD:-financas}@db:5432/${POSTGRES_DB:-financas}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-True}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
